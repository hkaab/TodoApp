<div class="container">
  <div class="card">
    <h1>Todo App</h1>
    <p class="muted">Angular frontend + ASP.NET Core Web API backend</p>

    <form class="row" [formGroup]="form" (ngSubmit)="submit()">
      <input type="text" formControlName="title" placeholder="Enter a todo item" />
      <button class="primary" type="submit" [disabled]="loading()">
        {{ editingId() ? 'Save' : 'Add' }}
      </button>
      <button type="button" *ngIf="editingId()" (click)="cancelEdit()">Cancel</button>
    </form>

    <div class="error" *ngIf="form.controls.title.touched && form.controls.title.invalid">
      Title is required and must be 200 characters or fewer.
    </div>

    <div class="error" *ngIf="error()">{{ error() }}</div>
    <p class="muted" *ngIf="loading()">Loading...</p>

    <ul>
      <li *ngFor="let todo of todos()">
        <span [class.completed]="todo.isCompleted">{{ todo.title }}</span>
        <div class="actions">
          <button type="button" (click)="toggle(todo)">{{ todo.isCompleted ? 'Undo' : 'Done' }}</button>
          <button type="button" (click)="edit(todo)">Edit</button>
          <button class="danger" type="button" (click)="remove(todo)">Delete</button>
        </div>
      </li>
    </ul>

    <p class="muted" *ngIf="!loading() && todos().length === 0">No todos yet.</p>
  </div>
</div>
