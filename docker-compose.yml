services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5043:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080

  ui:
    build:
      context: ./frontend/todo-app-ui
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
